<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  html, body { height: 100%; margin: 0; padding: 0; background-color: #ffffff; }
  body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; }
  .transit-box { text-align: center; }
  .label { font-size: 0.8rem; color: #666666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
  #departure { font-size: 1.6rem; font-weight: bold; color: #1217A6; }
  #dest { font-size: 0.9rem; color: #333333; margin-top: 2px; }
</style>
</head>
<body>

<div class="transit-box">
  <div class="label">Silver Line Outbound</div>
  <div id="departure">Updating...</div>
  <div id="dest">...</div>
</div>

<script>
  async function getDeparture() {
    try {
      // direction_id=1 filters specifically for Outbound service
      const response = await fetch('https://api-v3.mbta.com/predictions?filter[stop]=place-crtst&filter[direction_id]=1&filter[route_type]=3&include=trip&sort=departure_time');
      const data = await response.json();
      
      const next = data.data.find(p => p.attributes.departure_time);
      if (next) {
        const depTime = new Date(next.attributes.departure_time);
        const now = new Date();
        const minutes = Math.round((depTime - now) / 60000);
        
        // Grab the headsign (destination) from the included trip data
        const tripId = next.relationships.trip.data.id;
        const trip = data.included.find(t => t.id === tripId);
        const destination = trip ? trip.attributes.headsign : "Outbound";
        
        document.getElementById('departure').innerHTML = minutes <= 1 ? "Arriving" : `${minutes} min`;
        document.getElementById('dest').innerHTML = destination;
      } else {
        document.getElementById('departure').innerHTML = "No service";
        document.getElementById('dest').innerHTML = "";
      }
    } catch (e) {
      document.getElementById('departure').innerHTML = "Offline";
    }
  }

  getDeparture();
  setInterval(getDeparture, 30000);
</script>
</body>
</html>
